<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos de Técnicos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .form-group input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
        }

        .section-title {
            font-size: 16px;
            color: var(--primary-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
            margin: 25px 0 15px 0;
            text-transform: uppercase;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        th, td {
            padding: 10px;
            border: 1px solid var(--border-color);
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #f1f5f9;
            color: var(--primary-color);
            font-weight: 600;
        }

        .btn-add {
            background-color: #e2e8f0;
            color: #334155;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background-color: #cbd5e1;
        }

        .btn-delete {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover {
            background-color: #dc2626;
        }

        .totals-section {
            margin-top: 30px;
            padding: 15px;
            background: #e2e8f0;
            border-radius: 6px;
            display: flex;
            justify-content: flex-end;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .actions {
            margin-top: 30px;
            text-align: center;
        }

        .btn-submit {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(34, 197, 94, 0.2);
            transition: background 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            background-color: #16a34a;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container" id="hoja-gastos-container">
    <header>
        <h1>Hoja de Control de Gastos</h1>
    </header>

    <div class="meta-grid">
        <div class="form-group">
            <label for="tecnico">Nombre del Técnico</label>
            <input type="text" id="tecnico" placeholder="Ej. Juan Carlos">
        </div>
        <div class="form-group">
            <label for="fecha">Fecha del Informe</label>
            <input type="date" id="fecha">
        </div>
    </div>

    <div class="section-title">Gasolina / Combustible</div>
    <table id="tabla-gasolina">
        <thead>
            <tr>
                <th>Estación de Servicio / Concepto</th>
                <th style="width: 150px;">Importe (€)</th>
                <th style="width: 80px;" class="action-column">Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" placeholder="Ej. Gasolinera Repsol" style="width:100%; border:none; outline:none;"></td>
                <td><input type="number" class="monto" placeholder="0.00" step="0.01" style="width:100%; border:none; outline:none;" oninput="calcularTotales()"></td>
                <td class="action-column"><button class="btn-delete" onclick="eliminarFila(this)">X</button></td>
            </tr>
        </tbody>
    </table>
    <button class="btn-add action-column" onclick="agregarFila('tabla-gasolina')">+ Añadir Combustible</button>

    <div class="section-title">Materiales</div>
    <table id="tabla-materiales">
        <thead>
            <tr>
                <th>Descripción del Material / Proveedor</th>
                <th style="width: 150px;">Importe (€)</th>
                <th style="width: 80px;" class="action-column">Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" placeholder="Ej. Suministros Eléctricos" style="width:100%; border:none; outline:none;"></td>
                <td><input type="number" class="monto" placeholder="0.00" step="0.01" style="width:100%; border:none; outline:none;" oninput="calcularTotales()"></td>
                <td class="action-column"><button class="btn-delete" onclick="eliminarFila(this)">X</button></td>
            </tr>
        </tbody>
    </table>
    <button class="btn-add action-column" onclick="agregarFila('tabla-materiales')">+ Añadir Material</button>

    <div class="section-title">Parking / Peajes</div>
    <table id="tabla-parking">
        <thead>
            <tr>
                <th>Ubicación / Parking / Peaje</th>
                <th style="width: 150px;">Importe (€)</th>
                <th style="width: 80px;" class="action-column">Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" placeholder="Ej. Parking Hospital La Fe" style="width:100%; border:none; outline:none;"></td>
                <td><input type="number" class="monto" placeholder="0.00" step="0.01" style="width:100%; border:none; outline:none;" oninput="calcularTotales()"></td>
                <td class="action-column"><button class="btn-delete" onclick="eliminarFila(this)">X</button></td>
            </tr>
        </tbody>
    </table>
    <button class="btn-add action-column" onclick="agregarFila('tabla-parking')">+ Añadir Parking/Peaje</button>

    <div class="totals-section">
        <span>Total Gastos: <span id="total-general">0.00</span> €</span>
    </div>

    <div class="actions action-column">
        <button class="btn-submit" onclick="generarYCompartirPDF()">Generar y Enviar PDF</button>
    </div>
</div>

<script>
    // Inicializar el campo de la fecha con el día actual por defecto
    document.getElementById('fecha').valueAsDate = new Date();

    // Lógica para añadir dinámicamente filas a las tablas
    function agregarFila(idTabla) {
        const tabla = document.getElementById(idTabla).getElementsByTagName('tbody')[0];
        const nuevaFila = tabla.insertRow();

        const celdaConcepto = nuevaFila.insertCell(0);
        const celdaImporte = nuevaFila.insertCell(1);
        const celdaAccion = nuevaFila.insertCell(2);

        celdaConcepto.innerHTML = '<input type="text" placeholder="Concepto..." style="width:100%; border:none; outline:none;">';
        celdaImporte.innerHTML = '<input type="number" class="monto" placeholder="0.00" step="0.01" style="width:100%; border:none; outline:none;" oninput="calcularTotales()">';
        celdaAccion.innerHTML = '<button class="btn-delete" onclick="eliminarFila(this)">X</button>';
        celdaAccion.className = 'action-column';
    }

    // Lógica para eliminar una fila de la tabla
    function eliminarFila(boton) {
        const fila = boton.parentNode.parentNode;
        fila.parentNode.removeChild(fila);
        calcularTotales();
    }

    // Calcular el sumatorio total en tiempo real
    function calcularTotales() {
        const montos = document.querySelectorAll('.monto');
        let total = 0;
        montos.forEach(input => {
            const valor = parseFloat(input.value);
            if (!isNaN(valor)) {
                total += valor;
            }
        });
        document.getElementById('total-general').innerText = total.toFixed(2);
    }

    // Función principal de PDF y Envío Nativo
    function generarYCompartirPDF() {
        const elemento = document.getElementById('hoja-gastos-container');
        const nombreTecnico = document.getElementById('tecnico').value.trim() || 'Tecnico';
        const fecha = document.getElementById('fecha').value || 'Fecha';
        
        // Formatear un nombre único para el fichero PDF sin espacios problemáticos
        const nombreArchivo = `Gasto_${nombreTecnico.replace(/\s+/g, '_')}_${fecha}.pdf`;

        // 1. Ocultar de forma limpia los botones y columnas de acción para que el PDF quede profesional
        const elementosAOcultar = document.querySelectorAll('.action-column');
        elementosAOcultar.forEach(el => el.style.visibility = 'hidden');

        // 2. Parámetros de configuración del renderizador PDF
        const opciones = {
            margin:       12,
            filename:     nombreArchivo,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // 3. Compilar el HTML a PDF
        html2pdf().set(opciones).from(elemento).toPdf().get('pdf').then(function (pdf) {
            // Restaurar los botones en la interfaz de pantalla inmediatamente tras la foto
            elementosAOcultar.forEach(el => el.style.visibility = 'visible');
            
            const pdfBlob = pdf.output('blob');
            const archivo = new File([pdfBlob], nombreArchivo, { type: "application/pdf" });

            // 4. Intentar abrir el menú "Compartir" del smartphone (WhatsApp, Mail, etc.)
            if (navigator.share && navigator.canShare({ files: [archivo] })) {
                navigator.share({
                    files: [archivo],
                    title: `Hoja de Gastos - ${nombreTecnico}`,
                    text: `Adjunto reporte de gastos de ${nombreTecnico}.`
                })
                .catch((error) => console.log('Envío cancelado o error en el canal:', error));
            } else {
                // Comportamiento de respaldo para ordenadores de escritorio: descarga directa
                pdf.save(nombreArchivo);
                alert('Fichero PDF generado. Al estar en ordenador, se ha descargado de forma directa en tu equipo.');
            }
        });
    }
</script>

</body>
</html>
