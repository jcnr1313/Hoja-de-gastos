<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascensores La Fe - Gestión Técnica</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="image.png">
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="login-card card">
            <div class="login-logo">
                <img src="image.png" alt="Logo Elevia" class="company-logo-login">
            </div>
            <h2>Control de Acceso</h2>
            <p>Introduce tus credenciales para acceder al sistema técnico.</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" required placeholder="Tu usuario">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary btn-block">Iniciar Sesión</button>
                <p id="login-error" class="error-text hidden">Usuario o contraseña incorrectos.</p>
            </form>
        </div>
    </div>

    <div id="app-content" class="hidden">
        
        <header class="app-header">
            <div class="header-container">
                <div class="logo-container">
                    <img src="image.png" alt="Logo Elevia" class="company-logo">
                </div>
                <div class="app-title">
                    <h1>Ascensores La Fe</h1>
                    <p>Panel de Control y Mantenimiento Técnico</p>
                </div>
                <div class="logout-container">
                    <button id="btn-logout" class="btn-danger-outline">Cerrar Sesión</button>
                </div>
            </div>
        </header>

        <main class="app-container">
            
            <section class="search-section card">
                <h2>Buscar Ascensor</h2>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Introduce Nº de ascensor, RAE o teléfono...">
                    <button id="btn-search" class="btn-primary">Buscar</button>
                </div>
            </section>

            <section class="data-section card">
                <div class="section-header">
                    <h2>Unidades Registradas</h2>
                    <button id="btn-add-elevator" class="btn-secondary">+ Añadir Unidad</button>
                </div>
                
                <div class="table-responsive">
                    <table id="elevators-table">
                        <thead>
                            <tr>
                                <th>Nº ID</th>
                                <th>Nº RAE</th>
                                <th>Línea Teléfono</th>
                                <th>Código IMEI</th>
                                <th>Próxima OCA</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="elevators-list">
                            </tbody>
                    </table>
                </div>
            </section>

            <div id="elevator-modal" class="modal hidden">
                <div class="modal-content card">
                    <span class="close-modal">&times;</span>
                    <h2 id="modal-title">Detalles del Ascensor</h2>
                    <form id="elevator-form">
                        <input type="hidden" id="modal-action-type" value="edit">
                        <div class="form-group">
                            <label for="elevator-id">Número de Ascensor:</label>
                            <input type="number" id="elevator-id" required>
                        </div>
                        <div class="form-group">
                            <label for="elevator-rae">Número RAE:</label>
                            <input type="text" id="elevator-rae" required>
                        </div>
                        <div class="form-group">
                            <label for="elevator-phone">Línea Telefónica:</label>
                            <input type="tel" id="elevator-phone">
                        </div>
                        <div class="form-group">
                            <label for="elevator-imei">Código IMEI:</label>
                            <input type="text" id="elevator-imei">
                        </div>
                        <div class="form-group">
                            <label for="elevator-oca">Fecha Próxima OCA:</label>
                            <input type="date" id="elevator-oca">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">Guardar Cambios</button>
                            <button type="button" id="btn-cancel" class="btn-danger">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito.', reg))
                    .catch(err => console.error('Error al registrar el Service Worker.', err));
            });
        }
    </script>
</body>
</html>
